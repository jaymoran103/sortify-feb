<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sortify - Playlist Workspace</title>
        <link rel="stylesheet" href="workspace.css">
    </head>
    <body>

        <!-- Header with title, navigation and save controls -->
        <header class="sortify-header">

            <span class="header-wordmark" id="header-wordmark" onclick="window.location.href='../'">Sortify</span>
            <span class="header-sep">/</span>
            <span class="header-page-title">Workspace</span>

            <div class="header-spacer"></div>

            <div id="save-controls">
                <span id="save-status"></span>
                <button id="save-btn" disabled>Save</button>
                <button id="back-btn" onclick="window.location.href='../'"> Back to Dashboard</button> <!-- onclick here so navigation doesn't rely on JS-->

            </div>
        </header>
            
        <!-- Progress bar for load operations -->
        <div id="progress-bar"></div>


        <!-- Error state: shown when session loading fails. Message injected by showSessionError() -->
        <div id="session-error" hidden>
            <p id="session-error-message">An error occurred.</p>
            <a href="../">Back to Dashboard</a>
        </div>

        <!-- Control bar for table manipulation -->
        <div id="control-bar">
            <div id="sort-controls"></div>
            <div id="search-controls"></div>
            <span id="filter-counter"></span>
            <span id="selection-counter"></span>
            <!-- Single controls button opens a menu modal -->
            <div id="playlist-controls">
                <button id="add-workspace-btn">+ Add Content</button>
            </div>
        </div>

        <!-- Main workspace area -->
        <main id="workspace-container">
            <table id="workspace-table">
                <thead id="table-header"></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id="scroll-sentinel"></div>
        </main>

        <script type="module" src="workspace.js"></script>
    </body>
</html>
