<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sortify - Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    
    <!-- Header: Provides navigation and page title -->
    <header class="sortify-header">
        <span class="header-wordmark">Sortify</span>
        <span class="header-sep">/</span>
        <span class="header-page-title">Dashboard</span>
        <div class="header-spacer"></div>
    </header>

    <div class="page-body">
        <div class="cards-row">

            <!-- I/O Card: Provides buttons to import and export playlists -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Import / Export</span>
                </div>
                <div class="io-body">
                    <button id="import-btn">Import Playlists</button>
                    <button id="export-btn">Export Playlists</button>
                </div>
                <!-- Footer for load progress status: managed by StatusIndicator instance in app.js -->
                <div class="card-footer io-footer" id="io-footer" hidden></div>
                
            </div>

            <!-- Library Card: Provides simple display of available playlists -->
            <div class="card">

                <div class="card-header">
                    <span class="card-title">Library</span>
                </div>


                <!-- Control bar -->
                <div class="card-controlbar">

                    <!-- Control Bar: Category Control -->
                    <div class="sort-select-wrapper" style="margin-right:auto;">
                        <select id="library-view-select" class="sort-select">
                            <option value="playlists">Playlists</option>
                            <option value="tracks">Tracks</option>
                        </select>
                    </div>

                    <input id="library-search-input" class="modal__search-input" placeholder="Search playlists…" />

                    <!-- Control Bar: Sort control -->
                    <div class="sort-select-wrapper">
                        <select id="library-sort-select" class="sort-select"></select>
                    </div>

                    <!-- Control Bar: Actions Dropdown -->
                    <button id="library-actions-btn" class="dropdown__trigger dropdown__trigger--ellipsis" aria-label="Library actions">⋮</button>
                </div>

                <!-- Playlist display, populated by app.js on init -->
                <div class="library-list" id="library-list"></div>

                <!-- Stats display, populated by renderLibrary()  -->
                <div class="library-stats" id="library-stats" aria-live="polite" aria-atomic="true" hidden></div>


                <!-- <div class="card-footer"></div> -->

            </div>

            <!-- Workspace Card: Provides button to select playlists and open workspace -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Open Workspace</span>
                </div>
                <div class="ws-body">
                    <p class="card-desc">Select a set of playlists to open for side-by-side track editing.</p>
                    <button class="btn--full" id="open-workspace-btn">Select Playlists</button>
                </div>
            </div>


            <!-- Similarity Card: Provides button to open similarity module or run single-reference analysis. -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Overlap Analysis</span>
                </div>
                <div class="ws-body">
                    <p class="card-desc">Analyze overlap with a specific playlist, or review your whole library</p>
                    <button class="btn--full" id="simlarity-refscan-btn">Compare Playlist</button>
                    <button class="btn--full" id="similarity-module-btn">Analyze Library</button>
                </div>
            </div>

        </div><!-- /cards-row -->
    </div><!-- /page-body -->

    <!-- Hidden file input for CSV import -->
        <input type="file" id="importFileInput" accept=".csv,.json" multiple hidden>

    <script type="module" src="app.js"></script>
</body>
</html>
