<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Playlist Manager Test</title>
        <h1>Playlist Manager</h1>

        <link rel="stylesheet" href="style.css">
    </head>
    <body>  
        <div id="util-buttons-container">
            <h2>Utilities</h2>
            <button id="viewAllPlaylistsButton">View All</button>
            <button id="clearDisplayButton">Clear Display</button>
            <button id="clearStorageButton">Clear Storage</button>
        </div>

        <div id="import-container">
            <h2>Import Playlists</h2>
            <div id="progress-bar"></div> <!-- FUTURE: Find more fitting indicator for this page once fleshed out -->
            <button id="importButton">Import</button>
            <input type="file" id="csvFileInput" accept=".csv" multiple hidden />
            <span id="file-count-label"></span>
        </div>

        <div id="workspace-container">
            <h2>Workspace</h2>
            <button id="open-workspace-all-btn">Open Workspace (All Playlists)</button>
            <button id="open-workspace-select-btn">Open Workspace (Select Playlists)</button>
            <div id="playlist-select-panel">
                <strong>Select playlists to open in workspace:</strong>
                <div></div> <!-- Leaving buttons above display list, in case many playlists are available. FUTURE: find better look-->
                <button id="confirm-select-btn">Open in Workspace</button>
                <button id="cancel-select-btn">Cancel</button>
                <div id="playlist-select-list" style="margin: 8px 0;"></div>
                
            </div>
        </div>

        
        <div id="playlist-container"></div>
    </body>
    <script type="module" src="app.js"></script>
</html>
