<html>
    <head>
        <meta charset="utf-8">
        <title>Playlist Manager Test</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>  
        <h1>Playlist Manager</h1>

        <div id="util-buttons-container">
            <button id="viewAllPlaylistsButton">View All</button>
            <button id="clearDisplayButton">Clear Display</button>
            <button id="clearStorageButton">Clear Storage</button>            
        </div>

        <div id="import-container">
            <button id="importButton">Import</button>
            <input type="file" id="csvFileInput" accept=".csv" multiple hidden />
            <span id="file-count-label"></span>
        </div>
        
        <div id="playlist-container"></div>
    </body>
    <script type="module" src="app.js"></script>
</html>
