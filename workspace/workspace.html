<html>
    <head>
        <meta charset="utf-8">
        <title>Playlist Workspace</title>
        <!-- Standalone styling, no dependencies for now.
         Will extract styling to root once workspace is fleshed out -->

        <link rel="stylesheet" href="workspace.css">
    </head>
    <body>

        <!-- Header with title, navigation and save controls -->
        <header id="workspace-header">
            <h1>Playlist Workspace</h1>
            <button id="back-btn">Back to Dashboard</button>

            <div id="save-controls">
                <button id="save-btn" disabled>Save</button>
                <span id="save-status"></span>

            </div>
        </header>

        <!-- Control bar facilitating table manipulation -->
        <div id="control-bar">
            <div id="sort-controls"></div>
            <!-- <div id="search-controls"></div> -->
            <!-- <div id="playlist-controls"></div> -->
        </div>

        <!-- Main workspace area -->
        <main id="workspace-container">
            <table id="workspace-table">
                <thead id="table-header"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </main>

        <script type="module" src="workspace.js"></script>
    </body>
</html>
